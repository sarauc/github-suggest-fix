name: AI Suggest Fix

on:
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  suggest-fix:
    runs-on: ubuntu-latest
    # Trigger when the PR author (or anyone) replies to a review comment with /suggest-fix.
    # in_reply_to_id being non-empty means this is a reply, not a root review comment.
    if: |
      github.event.comment.in_reply_to_id != '' &&
      contains(github.event.comment.body, '/suggest-fix')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run suggest-fix script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ID of the /suggest-fix reply (used to avoid re-triggering on our own posts)
          REPLY_COMMENT_ID: ${{ github.event.comment.id }}
          # ID of the reviewer's original root comment — contains path, line, and body
          PARENT_COMMENT_ID: ${{ github.event.comment.in_reply_to_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/suggest_fix.py
